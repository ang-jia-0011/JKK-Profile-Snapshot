name: Build extension

on:
  workflow_dispatch:
    inputs:
      browser:
        description: Browser target
        required: true
        default: chrome
        type: choice
        options:
          - chrome
          - firefox
          - edge

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ inputs.browser }} extension
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Type check
        run: yarn compile

      - name: Build extension package
        run: yarn wxt zip -b ${{ inputs.browser }}

      - name: Prepare artifact
        env:
          BROWSER_TARGET: ${{ inputs.browser }}
        run: |
          mkdir -p .artifacts
          echo "Generated files:"
          find .output -maxdepth 2 -type f -print

          zip_path="$(find .output -maxdepth 1 -type f -name "*-${BROWSER_TARGET}.zip" | head -n 1)"

          if [ -z "$zip_path" ]; then
            echo "No extension zip found for browser target: ${BROWSER_TARGET}"
            exit 1
          fi

          cp "$zip_path" ".artifacts/profile-snapshot-${BROWSER_TARGET}.zip"

      - name: Upload extension artifact
        uses: actions/upload-artifact@v7
        with:
          name: profile-snapshot-${{ inputs.browser }}
          path: .artifacts/profile-snapshot-${{ inputs.browser }}.zip
          if-no-files-found: error
